openapi: 3.1.0
info:
  title: Universo Platformo REST API
  version: 3.1.0
  description: Current-state OpenAPI catalog for the mounted Universo Platformo
    REST surface. This specification is generated from the live backend route
    files so the documented path and method inventory stays aligned with the
    repository after refactors.
  contact:
    name: Universo Platformo API Support
    url: https://universo.pro/support
    email: api@universo.pro
  license:
    name: Omsk Open License
    url: https://universo.pro/ol
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://your-instance.example.com/api/v1
    description: Deployed instance placeholder
tags:
  - name: System
    description: Health and runtime readiness endpoints.
  - name: Auth
    description: Authentication, registration, session bootstrap, and CSRF support
      endpoints.
  - name: Public Locales
    description: Public locale feeds available before authenticated bootstrap.
  - name: Profile
    description: Profile and personal settings endpoints.
  - name: Onboarding
    description: Authenticated onboarding and start-flow endpoints.
  - name: Admin Global Users
    description: Global user administration endpoints.
  - name: Admin Instances
    description: Platform instance administration endpoints.
  - name: Admin Roles
    description: Global role and permission management endpoints.
  - name: Admin Locales
    description: Administrative locale management endpoints.
  - name: Admin Settings
    description: Administrative platform settings endpoints.
  - name: Applications
    description: Application catalog and application membership/runtime metadata endpoints.
  - name: Connectors
    description: Application connector and connector-publication link endpoints.
  - name: Application Runtime Sync
    description: Application schema sync, diff, and release-bundle endpoints.
  - name: Metahubs
    description: Metahub CRUD and member-management endpoints.
  - name: Public Metahubs
    description: Publicly readable metahub endpoints.
  - name: Branches
    description: Metahub branch management endpoints.
  - name: Publications
    description: Publication lifecycle, versions, and publication-application link
      endpoints.
  - name: Metahub Migrations
    description: Metahub migration status, planning, and apply endpoints.
  - name: Application Migrations
    description: Application migration history and controlled apply endpoints inside
      the metahub domain.
  - name: Entity Types
    description: Entity-type definition CRUD endpoints for direct standard kinds and
      custom entity kinds.
  - name: Entities
    description: Canonical entity-owned instance routes for custom and standard
      metadata kinds, including managed child-resource tabs.
  - name: Entity Actions
    description: Entity action definition and execution endpoints.
  - name: Event Bindings
    description: Entity event-binding endpoints for design-time automation wiring.
  - name: Attributes
    description: Attribute CRUD, move, display, reorder, and child management endpoints.
  - name: Constants
    description: Constant CRUD, reorder, move, and copy endpoints.
  - name: Records
    description: Record CRUD, reorder, move, and copy endpoints.
  - name: Layouts
    description: Layout CRUD and zone-widget endpoints.
  - name: Scripts
    description: Metahub script CRUD and source-management endpoints.
  - name: Shared Entity Overrides
    description: Metahub-level shared entity override endpoints.
  - name: Settings
    description: Metahub settings and metahub setting-key endpoints.
  - name: Templates
    description: Template catalog endpoints.
