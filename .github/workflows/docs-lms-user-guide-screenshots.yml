name: LMS User Guide Screenshots

on:
    pull_request: {}
    workflow_dispatch:

permissions:
    contents: read

jobs:
    verify:
        runs-on: ubuntu-latest
        env:
            PUPPETEER_SKIP_DOWNLOAD: true
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.33.2

            - name: Setup Node
              uses: actions/setup-node@v5
              with:
                  node-version: '22.x'
                  cache: 'pnpm'
                  cache-dependency-path: 'pnpm-lock.yaml'

            - name: Install
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Regenerate and verify LMS user-guide screenshots
              run: pnpm docs:lms-user-guide:verify:local-supabase

            - name: Ensure regenerated LMS screenshots are committed
              run: |
                  git diff --exit-code -- \
                      docs/en/.gitbook/assets/lms-user-guide \
                      docs/ru/.gitbook/assets/lms-user-guide \
                      tools/docs/lms-user-guide-screenshot-provenance.json
