name: Node CI
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - '*'
permissions:
    contents: read
jobs:
    build:
        strategy:
            matrix:
                platform: [ubuntu-latest]
                node-version: [22.22.0]
        runs-on: ${{ matrix.platform }}
        env:
            PUPPETEER_SKIP_DOWNLOAD: true
            TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
            TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
        steps:
            - uses: actions/checkout@v5
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.2
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'pnpm'
                  cache-dependency-path: 'pnpm-lock.yaml'
            - run: pnpm install
            - name: Check catalog versions
              run: pnpm check:catalog-versions
            - name: Check flattened package layout
              run: pnpm check:no-package-base-paths
            - name: Check package naming convention
              run: pnpm check:package-naming
            - name: Check apps-template isolation
              run: pnpm check:apps-template-isolation
            - name: Check PlayCanvas Editor isolation
              run: pnpm check:playcanvas-editor-isolation
            - run: pnpm lint
            - name: Check PlayCanvas Editor package
              run: |
                  node -e "const [major,minor,patch]=process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && (minor < 22 || (minor === 22 && patch < 0)))) process.exit(1)"
                  pnpm --filter @universo-react/playcanvas-editor-frontend test
                  pnpm --filter @universo-react/playcanvas-editor-frontend editor:build
                  pnpm --filter @universo-react/playcanvas-editor-frontend editor:smoke
                  pnpm --filter @universo-react/playcanvas-editor-frontend exec playwright install --with-deps chromium
                  pnpm --filter @universo-react/playcanvas-editor-frontend editor:browser-smoke
            - name: Lint database access standard
              run: node tools/lint-db-access.mjs
            - name: Check LMS runtime release gates
              run: |
                  pnpm run check:runtime-no-lms-forks
                  pnpm run check:lms-fixture-contract
            - name: Check MMOOMM flight runtime release gates
              run: pnpm run check:mmoomm-flight-fixture-contract
            - name: Check MMOOMM app runtime release gates
              run: pnpm run check:mmoomm-app-fixture-contract
            - run: pnpm build
            - name: Install Playwright browser for MMOOMM flight runtime gate
              run: pnpm run playwright:install
            - name: Check MMOOMM flight browser runtime gate
              run: pnpm run test:e2e:mmoomm-flight-runtime:local-supabase
            - name: Check MMOOMM app UI-first fixture generator gate
              run: pnpm run test:e2e:mmoomm-app-gate:local-supabase
            - name: Stop local E2E Supabase
              if: always()
              run: pnpm supabase:e2e:stop
